<!DOCTYPE html>
<html>
<head>
    <title>Django CRUD</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }
        .container {
            width: 80%;
            margin: auto;
            margin-top: 40px;
        }
        h1 {
            text-align: center;
        }
        .btn {
            padding: 8px 12px;
            background: #3469db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn-danger {
            background: #e74c3c;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 10px;
            text-align: center;
        }
        form {
            background: white;
            padding: 20px;
            border-radius: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Student Management</h1>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
